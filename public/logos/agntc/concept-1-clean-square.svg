<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="blur"/><feComposite in="blur" in2="SourceGraphic" operator="over"/></filter>
    <linearGradient id="conn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="nc" cx="40%" cy="35%"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#CBD5E1"/></radialGradient>
  </defs>

  <!-- Coin disc -->
  <circle cx="256" cy="256" r="250" fill="#0A0A0F"/>
  <circle cx="256" cy="256" r="242" fill="none" stroke="url(#ring)" stroke-width="2.5"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="url(#ring)" stroke-width="0.8" opacity="0.3"/>

  <!-- Square frame connecting corner faction nodes -->
  <line x1="132" y1="132" x2="380" y2="132" stroke="url(#conn)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="380" y1="132" x2="380" y2="380" stroke="url(#conn)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="380" y1="380" x2="132" y2="380" stroke="url(#conn)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="132" y1="380" x2="132" y2="132" stroke="url(#conn)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Orbital ring through all 4 corners -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.5"/>

  <!-- Radial spokes to singularity -->
  <line x1="256" y1="256" x2="132" y2="132" stroke="url(#conn)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="380" y2="132" stroke="url(#conn)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="380" y2="380" stroke="url(#conn)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="132" y2="380" stroke="url(#conn)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Nodes -->
  <g filter="url(#glow)">
    <!-- Singularity (center) -->
    <circle cx="256" cy="256" r="18" fill="url(#nc)" opacity="0.95"/>
    <circle cx="256" cy="256" r="10" fill="#fff" opacity="0.15"/>

    <!-- Faction nodes at corners -->
    <circle cx="132" cy="132" r="14" fill="#0D9488" opacity="0.9"/>
    <circle cx="380" cy="132" r="14" fill="#DC2680" opacity="0.9"/>
    <circle cx="380" cy="380" r="14" fill="#F59E0B" opacity="0.85"/>
    <circle cx="132" cy="380" r="14" fill="#3B82F6" opacity="0.9"/>

    <!-- Unclaimed starting nodes at edge midpoints -->
    <circle cx="256" cy="132" r="4" fill="#8B5CF6" opacity="0.4"/>
    <circle cx="380" cy="256" r="4" fill="#8B5CF6" opacity="0.4"/>
    <circle cx="256" cy="380" r="4" fill="#8B5CF6" opacity="0.4"/>
    <circle cx="132" cy="256" r="4" fill="#8B5CF6" opacity="0.4"/>
  </g>
</svg>
