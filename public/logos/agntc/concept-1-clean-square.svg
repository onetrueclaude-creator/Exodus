<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="blur"/><feComposite in="blur" in2="SourceGraphic" operator="over"/></filter>
    <linearGradient id="conn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="n-center" cx="40%" cy="35%"><stop offset="0%" stop-color="#67FFFF"/><stop offset="100%" stop-color="#00D4FF"/></radialGradient>
    <radialGradient id="n-community" cx="40%" cy="35%"><stop offset="0%" stop-color="#F1F5F9"/><stop offset="100%" stop-color="#CBD5E1"/></radialGradient>
    <radialGradient id="n-machines" cx="40%" cy="35%"><stop offset="0%" stop-color="#FCD34D"/><stop offset="100%" stop-color="#D97706"/></radialGradient>
    <radialGradient id="n-founders" cx="40%" cy="35%"><stop offset="0%" stop-color="#FCA5A5"/><stop offset="100%" stop-color="#EF4444"/></radialGradient>
    <radialGradient id="n-professional" cx="40%" cy="35%"><stop offset="0%" stop-color="#5EEAFF"/><stop offset="100%" stop-color="#00B4D8"/></radialGradient>
  </defs>

  <!-- Coin disc -->
  <circle cx="256" cy="256" r="250" fill="#0A0A0F"/>
  <circle cx="256" cy="256" r="242" fill="none" stroke="url(#ring)" stroke-width="2.5"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="url(#ring)" stroke-width="0.8" opacity="0.3"/>

  <!-- Square perimeter connections -->
  <line x1="256" y1="80" x2="432" y2="256" stroke="url(#conn)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="432" y1="256" x2="256" y2="432" stroke="url(#conn)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="432" x2="80" y2="256" stroke="url(#conn)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="80" y1="256" x2="256" y2="80" stroke="url(#conn)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cross connections (ZK dashed) -->
  <line x1="256" y1="80" x2="256" y2="432" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="8 10" opacity="0.2" stroke-linecap="round"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="8 10" opacity="0.2" stroke-linecap="round"/>

  <!-- Radial spokes to center -->
  <line x1="256" y1="256" x2="256" y2="80" stroke="url(#conn)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="432" y2="256" stroke="url(#conn)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="256" y2="432" stroke="url(#conn)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="80" y2="256" stroke="url(#conn)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Nodes -->
  <g filter="url(#glow)">
    <circle cx="256" cy="256" r="18" fill="url(#n-center)" opacity="0.95"/>
    <circle cx="256" cy="256" r="10" fill="#fff" opacity="0.15"/>
    <circle cx="256" cy="80" r="14" fill="url(#n-community)" opacity="0.9"/>
    <circle cx="432" cy="256" r="14" fill="url(#n-machines)" opacity="0.9"/>
    <circle cx="256" cy="432" r="14" fill="url(#n-founders)" opacity="0.9"/>
    <circle cx="80" cy="256" r="14" fill="url(#n-professional)" opacity="0.9"/>
  </g>
</svg>
