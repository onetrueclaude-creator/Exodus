<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="blur"/><feComposite in="blur" in2="SourceGraphic" operator="over"/></filter>
    <filter id="glow-strong"><feGaussianBlur stdDeviation="12" result="blur"/><feComposite in="blur" in2="SourceGraphic" operator="over"/></filter>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="nc" cx="40%" cy="35%"><stop offset="0%" stop-color="#67FFFF"/><stop offset="100%" stop-color="#00D4FF"/></radialGradient>
  </defs>

  <!-- Coin disc -->
  <circle cx="256" cy="256" r="250" fill="#0A0A0F"/>
  <circle cx="256" cy="256" r="242" fill="none" stroke="url(#ring)" stroke-width="2.5"/>

  <!-- Faction-colored connections (each spoke glows its faction color) -->
  <!-- Community (white) — top -->
  <line x1="256" y1="256" x2="256" y2="85" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round" opacity="0.08"/>
  <line x1="256" y1="256" x2="256" y2="85" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Machines (gold) — right -->
  <line x1="256" y1="256" x2="427" y2="256" stroke="#D97706" stroke-width="6" stroke-linecap="round" opacity="0.08"/>
  <line x1="256" y1="256" x2="427" y2="256" stroke="#D97706" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Founders (red) — bottom -->
  <line x1="256" y1="256" x2="256" y2="427" stroke="#EF4444" stroke-width="6" stroke-linecap="round" opacity="0.08"/>
  <line x1="256" y1="256" x2="256" y2="427" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Professional (cyan) — left -->
  <line x1="256" y1="256" x2="85" y2="256" stroke="#00D4FF" stroke-width="6" stroke-linecap="round" opacity="0.08"/>
  <line x1="256" y1="256" x2="85" y2="256" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Square perimeter (neutral gradient) -->
  <line x1="256" y1="85" x2="427" y2="256" stroke="#667788" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>
  <line x1="427" y1="256" x2="256" y2="427" stroke="#667788" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>
  <line x1="256" y1="427" x2="85" y2="256" stroke="#667788" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>
  <line x1="85" y1="256" x2="256" y2="85" stroke="#667788" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>

  <!-- ZK dashed cross -->
  <line x1="256" y1="85" x2="256" y2="427" stroke="#8B5CF6" stroke-width="1.2" stroke-dasharray="8 10" opacity="0.15"/>
  <line x1="85" y1="256" x2="427" y2="256" stroke="#8B5CF6" stroke-width="1.2" stroke-dasharray="8 10" opacity="0.15"/>

  <!-- Faction glow halos -->
  <g filter="url(#glow-strong)">
    <circle cx="256" cy="85" r="8" fill="#CBD5E1" opacity="0.15"/>
    <circle cx="427" cy="256" r="8" fill="#D97706" opacity="0.15"/>
    <circle cx="256" cy="427" r="8" fill="#EF4444" opacity="0.15"/>
    <circle cx="85" cy="256" r="8" fill="#00D4FF" opacity="0.15"/>
  </g>

  <!-- Nodes -->
  <g filter="url(#glow)">
    <circle cx="256" cy="256" r="18" fill="url(#nc)" opacity="0.95"/>
    <circle cx="256" cy="256" r="10" fill="#fff" opacity="0.15"/>

    <circle cx="256" cy="85" r="14" fill="#CBD5E1" opacity="0.9"/>
    <circle cx="427" cy="256" r="14" fill="#D97706" opacity="0.9"/>
    <circle cx="256" cy="427" r="14" fill="#EF4444" opacity="0.85"/>
    <circle cx="85" cy="256" r="14" fill="#00D4FF" opacity="0.9"/>
  </g>
</svg>
