<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="brush" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.008" numOctaves="4" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="blur"/><feComposite in="blur" in2="SourceGraphic" operator="over"/></filter>
    <linearGradient id="conn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="orbit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.25"/>
    </linearGradient>
    <radialGradient id="nc" cx="40%" cy="35%"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#CBD5E1"/></radialGradient>
  </defs>

  <!-- Coin disc -->
  <circle cx="256" cy="256" r="250" fill="#0A0A0F"/>
  <circle cx="256" cy="256" r="242" fill="none" stroke="url(#ring)" stroke-width="2.5"/>

  <g filter="url(#brush)">
    <!-- Curved square frame connecting corners -->
    <path d="M128,128 Q256,118 384,128" stroke="url(#conn)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M384,128 Q394,256 384,384" stroke="url(#conn)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M384,384 Q256,394 128,384" stroke="url(#conn)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M128,384 Q118,256 128,128" stroke="url(#conn)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Curved spokes to singularity -->
    <path d="M256,256 Q190,190 128,128" stroke="url(#conn)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M256,256 Q322,190 384,128" stroke="url(#conn)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M256,256 Q322,322 384,384" stroke="url(#conn)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M256,256 Q190,322 128,384" stroke="url(#conn)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Orbital ring through corners -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="url(#orbit)" stroke-width="2.5"/>

  <!-- Nodes -->
  <g filter="url(#glow)">
    <circle cx="256" cy="256" r="18" fill="url(#nc)" opacity="0.95"/>
    <circle cx="256" cy="256" r="10" fill="#fff" opacity="0.15"/>

    <circle cx="128" cy="128" r="14" fill="#0D9488" opacity="0.9"/>
    <circle cx="384" cy="128" r="15" fill="#DC2680" opacity="0.9"/>
    <circle cx="384" cy="384" r="13" fill="#F59E0B" opacity="0.85"/>
    <circle cx="128" cy="384" r="15" fill="#3B82F6" opacity="0.9"/>

    <!-- Unclaimed starting nodes at edge midpoints -->
    <circle cx="256" cy="128" r="4" fill="#8B5CF6" opacity="0.4"/>
    <circle cx="384" cy="256" r="4" fill="#8B5CF6" opacity="0.4"/>
    <circle cx="256" cy="384" r="4" fill="#8B5CF6" opacity="0.4"/>
    <circle cx="128" cy="256" r="4" fill="#8B5CF6" opacity="0.4"/>
  </g>
</svg>
