<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="blur"/><feComposite in="blur" in2="SourceGraphic" operator="over"/></filter>
    <filter id="brush" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.008" numOctaves="4" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="zk-line" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="conn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="orbit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="nc" cx="40%" cy="35%"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#CBD5E1"/></radialGradient>
  </defs>

  <!-- Coin disc -->
  <circle cx="256" cy="256" r="250" fill="#0A0A0F"/>
  <circle cx="256" cy="256" r="242" fill="none" stroke="url(#ring)" stroke-width="2.5"/>

  <g filter="url(#brush)">
    <!-- Prominent ZK diagonal cross (these ARE the spokes to singularity) -->
    <line x1="132" y1="132" x2="380" y2="380" stroke="url(#zk-line)" stroke-width="3" stroke-linecap="round"/>
    <line x1="380" y1="132" x2="132" y2="380" stroke="url(#zk-line)" stroke-width="3" stroke-linecap="round"/>

    <!-- Square frame -->
    <line x1="132" y1="132" x2="380" y2="132" stroke="url(#conn)" stroke-width="2" stroke-linecap="round"/>
    <line x1="380" y1="132" x2="380" y2="380" stroke="url(#conn)" stroke-width="2" stroke-linecap="round"/>
    <line x1="380" y1="380" x2="132" y2="380" stroke="url(#conn)" stroke-width="2" stroke-linecap="round"/>
    <line x1="132" y1="380" x2="132" y2="132" stroke="url(#conn)" stroke-width="2" stroke-linecap="round"/>

    <!-- Inner diamond at edge midpoints (decorative) -->
    <line x1="256" y1="132" x2="380" y2="256" stroke="url(#conn)" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
    <line x1="380" y1="256" x2="256" y2="380" stroke="url(#conn)" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
    <line x1="256" y1="380" x2="132" y2="256" stroke="url(#conn)" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
    <line x1="132" y1="256" x2="256" y2="132" stroke="url(#conn)" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Orbital ring through corners -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="url(#orbit)" stroke-width="2"/>

  <!-- Nodes -->
  <g filter="url(#glow)">
    <!-- Singularity -->
    <circle cx="256" cy="256" r="20" fill="url(#nc)" opacity="0.95"/>
    <circle cx="256" cy="256" r="11" fill="#fff" opacity="0.15"/>

    <!-- Faction nodes at corners -->
    <circle cx="132" cy="132" r="14" fill="#0D9488" opacity="0.9"/>
    <circle cx="380" cy="132" r="14" fill="#DC2680" opacity="0.9"/>
    <circle cx="380" cy="380" r="14" fill="#F59E0B" opacity="0.85"/>
    <circle cx="132" cy="380" r="14" fill="#3B82F6" opacity="0.9"/>

    <!-- Inner diamond accent nodes (small, at edge midpoints) -->
    <circle cx="256" cy="132" r="5" fill="#8B5CF6" opacity="0.5"/>
    <circle cx="380" cy="256" r="5" fill="#8B5CF6" opacity="0.5"/>
    <circle cx="256" cy="380" r="5" fill="#8B5CF6" opacity="0.5"/>
    <circle cx="132" cy="256" r="5" fill="#8B5CF6" opacity="0.5"/>
  </g>
</svg>
