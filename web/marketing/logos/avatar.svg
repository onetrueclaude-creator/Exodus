<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="glow-a"><feGaussianBlur stdDeviation="4" result="blur"/><feComposite in="blur" in2="SourceGraphic" operator="over"/></filter>
    <filter id="glow-strong-a"><feGaussianBlur stdDeviation="8" result="blur"/><feComposite in="blur" in2="SourceGraphic" operator="over"/></filter>
    <linearGradient id="ring-a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="orbit-a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="nc-a" cx="40%" cy="35%"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#CBD5E1"/></radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="32" fill="#0A0A0F"/>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#ring-a)" stroke-width="2"/>

  <!-- Orbital ring -->
  <circle cx="200" cy="200" r="130" fill="none" stroke="url(#orbit-a)" stroke-width="2"/>

  <!-- Faction-colored spokes -->
  <line x1="200" y1="200" x2="100" y2="100" stroke="#0D9488" stroke-width="4" stroke-linecap="round" opacity="0.08"/>
  <line x1="200" y1="200" x2="100" y2="100" stroke="#0D9488" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="200" y1="200" x2="300" y2="100" stroke="#DC2680" stroke-width="4" stroke-linecap="round" opacity="0.08"/>
  <line x1="200" y1="200" x2="300" y2="100" stroke="#DC2680" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="200" y1="200" x2="300" y2="300" stroke="#F59E0B" stroke-width="4" stroke-linecap="round" opacity="0.08"/>
  <line x1="200" y1="200" x2="300" y2="300" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="200" y1="200" x2="100" y2="300" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" opacity="0.08"/>
  <line x1="200" y1="200" x2="100" y2="300" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Square frame (neutral) -->
  <line x1="100" y1="100" x2="300" y2="100" stroke="#667788" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="300" y1="100" x2="300" y2="300" stroke="#667788" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="300" y1="300" x2="100" y2="300" stroke="#667788" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="100" y1="300" x2="100" y2="100" stroke="#667788" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Faction glow halos -->
  <g filter="url(#glow-strong-a)">
    <circle cx="100" cy="100" r="5" fill="#0D9488" opacity="0.15"/>
    <circle cx="300" cy="100" r="5" fill="#DC2680" opacity="0.15"/>
    <circle cx="300" cy="300" r="5" fill="#F59E0B" opacity="0.15"/>
    <circle cx="100" cy="300" r="5" fill="#3B82F6" opacity="0.15"/>
  </g>

  <!-- Edge midpoint dots -->
  <circle cx="200" cy="100" r="2" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="300" cy="200" r="2" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="200" cy="300" r="2" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="100" cy="200" r="2" fill="#8B5CF6" opacity="0.4"/>

  <!-- Nodes -->
  <g filter="url(#glow-a)">
    <circle cx="200" cy="200" r="15" fill="url(#nc-a)" opacity="0.95"/>
    <circle cx="200" cy="200" r="8" fill="#fff" opacity="0.15"/>
    <circle cx="100" cy="100" r="10" fill="#0D9488" opacity="0.9"/>
    <circle cx="300" cy="100" r="10" fill="#DC2680" opacity="0.9"/>
    <circle cx="300" cy="300" r="10" fill="#F59E0B" opacity="0.85"/>
    <circle cx="100" cy="300" r="10" fill="#3B82F6" opacity="0.9"/>
  </g>
</svg>
