version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/chain"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "chain"

  - package-ecosystem: "npm"
    directory: "/apps/game"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "game"
    groups:
      react-stack:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
