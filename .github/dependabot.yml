version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/chain"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "chain"
    groups:
      # Chain pip deps live in a single requirements.txt where Dependabot's
      # individual-PR mode creates adjacent-line conflicts on every merge
      # (we hit this 4x in one session on #69/#71/#77/#78). One batched
      # weekly PR avoids the rebase-storm without sacrificing visibility.
      chain-deps:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/apps/game"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "game"
    groups:
      react-stack:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      # Dev tooling (tailwind, vite, vitest, postcss…) shares apps/game's single
      # package-lock.json; individual-PR mode triggers the same adjacent-line
      # rebase-storm documented for chain-deps above — hit live on #184/#190/#191
      # (three open PRs, one lockfile). Batch them into one weekly PR.
      dev-tooling:
        dependency-type: "development"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # eslint 10+ blocked by eslint-config-next bundling an older
      # eslint-plugin-react that uses pre-ESLint-10 rule context APIs
      # (PR #58 closed 2026-04-22). Revisit when upstream releases.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # @noble/hashes 2.x reorganised its sub-path exports: the per-algorithm
      # entrypoints were dropped, so `@noble/hashes/sha256` (used by
      # src/lib/vaultProof.ts) no longer resolves — sha256 now lives under
      # `@noble/hashes/sha2`. The 2.x bump therefore breaks the game build.
      # Stay on ^1.8 until the imports are migrated. Supersedes #139.
      - dependency-name: "@noble/hashes"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    ignore:
      # Major bumps of CI actions are adopted by hand, not auto-proposed:
      # checkout v4→v7 (#135), setup-node v4→v6 (#134), gitleaks-action v2→v3
      # (#137) each sat open as BLOCKED PRs. Patches/minors + security updates
      # still flow normally; revisit majors when adopting a new runner feature.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
