name: CI

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main]

# Least-privilege default for GITHUB_TOKEN. These jobs only check out and
# build/test, so read-only contents is sufficient. Elevate per-job if a
# future job needs to write (e.g. comment on a PR) — do not widen here.
permissions:
  contents: read

jobs:
  chain-tests:
    name: Chain Tests (Python)
    runs-on: ubuntu-latest
    steps:
      # Pinned to commit SHAs (supply-chain hardening, P0-11): a moved tag
      # cannot inject code (tj-actions/changed-files CVE-2025-30066 shape).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: chain/requirements.txt
      - name: Install dependencies
        run: |
          cd chain
          pip install -r requirements.txt
          pip install pytest pytest-timeout numpy
      - name: Run tests
        run: |
          cd chain
          python -m pytest tests/ -v \
            --timeout=120 \
            --ignore=tests/benchmarks \
            --deselect=tests/test_api.py::TestMine::test_mine_enforces_block_timing \
            --deselect=tests/test_api.py::TestReset::test_reset_creates_fresh_ledger \
            --deselect=tests/test_api.py::TestMessages::test_message_appears_in_history \
            --deselect=tests/test_api_birth.py::TestBirthEndpoint::test_birth_after_mining \
            --deselect=tests/test_api_mine_records.py::TestMineCreatesRecords::test_mine_changes_state_root \
            --deselect=tests/test_api_mine_records.py::TestMineCreatesRecords::test_mine_increases_record_count \
            --deselect=tests/test_node_lockdown.py::TestTransactionGating::test_multiple_endpoints_check_hash \
            -q

  game-build:
    name: Game Build + Tests (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/game/package-lock.json
      # `npm install` (not `npm ci`) because Dependabot's regenerated
      # lockfile occasionally drops the optional native `utf-8-validate`
      # (transitive via `ws`); `npm ci` would error on the missing entry
      # and block the PR until a Node 22 local regen + force-push.
      # `npm install` reconstructs from package.json without erroring.
      # Trades a small amount of CI determinism for not blocking Dependabot.
      - name: Install dependencies
        run: cd apps/game && npm install --no-audit --no-fund
      - name: Generate Prisma client
        run: cd apps/game && npx prisma generate
      - name: Build
        run: cd apps/game && npm run build
      - name: Run tests
        run: cd apps/game && npm run test:run
