name: CI

on:
  pull_request:
    branches: [main, exodus-dev]
  push:
    branches: [main]

jobs:
  chain-tests:
    name: Chain Tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: chain/requirements.txt
      - name: Install dependencies
        run: |
          cd chain
          pip install -r requirements.txt
          pip install pytest pytest-timeout numpy
      - name: Run tests
        run: |
          cd chain
          python -m pytest tests/ -v \
            --timeout=120 \
            --ignore=tests/benchmarks \
            --deselect=tests/test_api.py::TestMine::test_mine_enforces_block_timing \
            --deselect=tests/test_api.py::TestReset::test_reset_creates_fresh_ledger \
            --deselect=tests/test_api.py::TestMessages::test_message_appears_in_history \
            --deselect=tests/test_api_birth.py::TestBirthEndpoint::test_birth_after_mining \
            --deselect=tests/test_api_mine_records.py::TestMineCreatesRecords::test_mine_changes_state_root \
            --deselect=tests/test_api_mine_records.py::TestMineCreatesRecords::test_mine_increases_record_count \
            --deselect=tests/test_node_lockdown.py::TestTransactionGating::test_multiple_endpoints_check_hash \
            -q

  game-build:
    name: Game Build + Tests (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/game/package-lock.json
      - name: Install dependencies
        run: cd apps/game && npm ci
      - name: Generate Prisma client
        run: cd apps/game && npx prisma generate
      - name: Build
        run: cd apps/game && npm run build
      - name: Run tests
        run: cd apps/game && npm run test:run
