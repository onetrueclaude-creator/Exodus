name: Security Scan

# Security scanners (P0-10 gitleaks, P0-19 Bandit + Semgrep).
#
# This is a SEPARATE workflow from ci.yml on purpose. The bandit job (Python
# SAST) is a BLOCKING gate (W4 Security): a medium-or-higher severity finding
# fails the run. gitleaks and semgrep stay NON-BLOCKING (continue-on-error /
# report-only) — they surface findings for triage without blocking merges.
# To enforce bandit on merges as well, add "bandit (python SAST)" to the
# branch-protection required checks (alongside the ci.yml checks).
#
# All actions are pinned to commit SHAs (supply-chain hardening, P0-11).

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege default. Scanners only read the checkout.
permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    # Advisory only — a finding here must not block the PR.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so gitleaks can scan past commits
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          # gitleaks-action v2 requires GITHUB_TOKEN to read PR context. The
          # auto-provided token is read-only here (top-level permissions:
          # contents: read) and is enough — no GITLEAKS_LICENSE is needed for
          # plain repo scanning (the org/PR-comment features need one). Advisory.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bandit:
    name: bandit (python SAST)
    runs-on: ubuntu-latest
    # BLOCKING gate (W4 Security) — no continue-on-error. A medium-or-higher
    # severity finding fails this job and the workflow run.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit over chain/ and scripts/
        # -ll raises the severity floor to MEDIUM: low-severity noise is still
        # printed but does not fail the run, while any medium+ finding exits
        # non-zero (no --exit-zero) and blocks the branch. Vendored/test trees
        # are skipped to avoid fixture false positives.
        run: |
          bandit -r chain/ scripts/ \
            -ll \
            --exclude chain/tests,chain/benchmarks \
            --format screen

  semgrep:
    name: semgrep (multi-lang SAST)
    runs-on: ubuntu-latest
    continue-on-error: true
    # Run the official Semgrep image directly (the returntocorp/semgrep-action
    # is deprecated). Pinned by tag; the container is the scanner.
    container:
      image: semgrep/semgrep:1.97.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run semgrep (report-only)
        # --error would fail on findings; we omit it so the job stays advisory.
        # Pre-existing findings are reported, not enforced.
        run: |
          semgrep scan \
            --config p/python \
            --config p/javascript \
            --config p/secrets \
            --metrics off \
            --disable-version-check
