name: Public Language (W1 legal posture)

# Advisory scan of tracked PUBLIC docs (spec/) for securities-risky / false-claim
# / ZK-over-claim language (constitution §II "never market future value").
# ADVISORY for now: reports findings, does not block. Flip to `--strict` (exit 1
# on any P0) once the W1 doc-rewrite PRs land and the docs are clean.

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  public-language:
    name: Public-doc language scan (advisory)
    runs-on: ubuntu-latest
    steps:
      # Pinned to commit SHAs (supply-chain hardening) — match ci.yml.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install test runner
        run: pip install pytest
      - name: Lint the linter (unit tests)
        run: python3 -m pytest scripts/test_check_public_language.py -q
      - name: Scan public docs (advisory — does not block yet)
        run: python3 scripts/check_public_language.py
