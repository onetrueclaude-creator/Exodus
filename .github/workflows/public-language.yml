name: Public Language (W1 legal posture)

# BLOCKING scan of tracked PUBLIC docs (spec/) for securities-risky / false-claim
# / ZK-over-claim language (constitution §II "never market future value").
# Runs `--strict` (exit 1 on any P0). Flipped to blocking 2026-06-26 after the W1
# doc-rewrite PRs (#171/#172) landed and main is P0-clean — this now PREVENTS any
# future P0 securities-risk language from re-entering the public docs.

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  public-language:
    name: Public-doc language scan
    runs-on: ubuntu-latest
    steps:
      # Pinned to commit SHAs (supply-chain hardening) — match ci.yml.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install test runner
        run: pip install pytest
      - name: Lint the linter (unit tests)
        run: python3 -m pytest scripts/test_check_public_language.py -q
      - name: Scan public docs (--strict — blocks on any P0)
        run: python3 scripts/check_public_language.py --strict
