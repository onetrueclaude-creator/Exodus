name: E2E (Playwright)

# End-to-end smoke suite against the FULL stack (chain + Postgres + game).
#
# This closes the biggest R8 test gap (W4): the Playwright smoke suite
# (tests/tests/*.spec.ts — 27 tests in 5 files) exists but has never run in CI
# against a live chain. It is wired here, but the whole job is NON-BLOCKING by
# design (`continue-on-error: true` at both the job and the test-step level) so
# a flaky or not-yet-green E2E run NEVER breaks the merge gate while the suite
# stabilizes. Failing steps still show red in the run for triage, and the
# Playwright HTML report is uploaded as an artifact.
#
# To promote this to a required, blocking check later: drop the job-level
# `continue-on-error`, then add "E2E Smoke (full stack, non-blocking)" to the
# branch-protection required checks.
#
# This is a SEPARATE workflow from ci.yml / security-scan.yml on purpose (those
# are owned elsewhere and must not be touched). All actions are pinned to commit
# SHAs (supply-chain hardening, P0-11), reusing the exact pins vetted in ci.yml.

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege: this job only checks out the repo and runs tests.
permissions:
  contents: read

jobs:
  e2e-smoke:
    name: E2E Smoke (full stack, non-blocking)
    runs-on: ubuntu-latest
    # NON-BLOCKING: the entire job is allowed to fail without failing the
    # workflow run, so chain-boot / build / test flakiness cannot block a merge
    # while the suite stabilizes. The individual failing step is still visible.
    continue-on-error: true

    services:
      # Mirrors apps/game/docker-compose.yml + apps/game/.env.example
      # (DATABASE_URL=postgresql://zkagentic:devpass@localhost:5432/zkagentic).
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: zkagentic
          POSTGRES_PASSWORD: devpass
          POSTGRES_DB: zkagentic
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # DB — must match the postgres service above + apps/game/.env.example.
      # prisma.config.ts reads url from process.env["DATABASE_URL"].
      DATABASE_URL: postgresql://zkagentic:devpass@localhost:5432/zkagentic
      # Server-only chain gateway target (B2): the game proxies chain calls here.
      TESTNET_API: http://127.0.0.1:8080
      # The E2E suite seeds the Zustand store directly (window.__gameStore) and
      # uses the localStorage identity fallback instead of real Google OAuth.
      # NEXT_PUBLIC_* is inlined at BUILD time, so it must be present for the
      # `next build` step below.
      NEXT_PUBLIC_DEV_IDENTITY: '1'
      ALLOW_DEV_CUSTODIAL_SIGN: '1'
      # NextAuth v5 placeholders. `next start` (production) requires AUTH_SECRET
      # to initialize. The suite never exercises real Google OAuth, so these are
      # inert non-secrets present only to satisfy NextAuth init.
      AUTH_SECRET: e2e-ci-placeholder-not-a-real-secret
      AUTH_GOOGLE_ID: e2e-ci-google-id-placeholder
      AUTH_GOOGLE_SECRET: e2e-ci-google-secret-placeholder

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # ── Chain (FastAPI testnet on :8080) ─────────────────────────────────
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: chain/requirements.txt
      - name: Install chain dependencies
        run: |
          pip install -r chain/requirements.txt
          # numpy is a REAL boot dependency of the API import chain
          # (agentic.testnet.api -> agentic.consensus.validator -> numpy, and
          # testnet.genesis -> verification.pipeline -> numpy), even though it is
          # commented out in requirements.txt. ci.yml's chain job installs it
          # too. Without it, `uvicorn ... api:app` fails with ModuleNotFoundError.
          pip install numpy
      - name: Start chain (testnet API) in the background
        env:
          SEED_DEV_FOUNDER: '1'
          ALLOW_DEV_CUSTODIAL_SIGN: '1'
        run: |
          nohup python3 -m uvicorn agentic.testnet.api:app \
            --host 127.0.0.1 --port 8080 --app-dir chain \
            > /tmp/chain.log 2>&1 &
          echo "chain uvicorn started (pid $!)"
      - name: Wait for chain on :8080
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/api/status >/dev/null 2>&1; then
              echo "chain is up after ${i}s:"
              curl -fsS http://127.0.0.1:8080/api/status || true
              echo
              exit 0
            fi
            sleep 1
          done
          echo "::error::chain did not answer on :8080 within 60s"
          echo "---- chain.log ----"; cat /tmp/chain.log || true
          exit 1

      # ── Game (Next.js on :3000) ──────────────────────────────────────────
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/game/package-lock.json
      # Root install brings in @playwright/test + tsx — the e2e harness
      # (playwright.config.ts, tests/) lives at the repo root, not in apps/game.
      # `npm install` (not `npm ci`) per the repo's lockfile-drift convention
      # documented in ci.yml.
      - name: Install root (Playwright) dependencies
        run: npm install --no-audit --no-fund
      - name: Install game dependencies
        run: cd apps/game && npm install --no-audit --no-fund
      - name: Prisma generate + migrate deploy
        run: |
          cd apps/game
          npx prisma generate
          npx prisma migrate deploy
      - name: Build game
        run: cd apps/game && npm run build
      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium
      - name: Seed empty Playwright storage state
        # playwright.config.ts points use.storageState at tests/.auth/user.json,
        # which is gitignored (generated locally) and therefore absent in CI.
        # The smoke suite authenticates via the dev-identity fallback + a direct
        # store seed, not real cookies — so an empty state is exactly what
        # 01-journey already uses inline. Create it so Playwright context
        # creation does not ENOENT on a missing storageState file.
        run: |
          mkdir -p tests/.auth
          printf '%s' '{"cookies":[],"origins":[]}' > tests/.auth/user.json
      - name: Start game (next start) in the background
        run: |
          cd apps/game
          nohup npm run start > /tmp/game.log 2>&1 &
          echo "next start launched (pid $!)"
      - name: Wait for game on :3000
        run: |
          for i in $(seq 1 120); do
            if curl -fsS -o /dev/null http://127.0.0.1:3000/game; then
              echo "game is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::game did not answer on :3000/game within 120s"
          echo "---- game.log ----"; cat /tmp/game.log || true
          exit 1

      # ── Run the smoke suite (explicitly non-blocking step) ───────────────
      - name: Run Playwright smoke suite
        id: playwright
        # NON-BLOCKING step: a test failure must not stop the workflow (the
        # report still uploads) and — together with the job-level
        # continue-on-error above — must not block the merge gate while the
        # suite stabilizes.
        continue-on-error: true
        # playwright.config.ts has `reuseExistingServer: true`, so Playwright
        # reuses the `next start` already listening on :3000 rather than booting
        # `next dev`. globalSetup.ts auto-detects the live chain on :8080, resets
        # genesis, and pre-claims the 4 faction homenodes.
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Dump server logs on failure
        if: ${{ failure() || steps.playwright.outcome == 'failure' }}
        run: |
          echo "==== chain.log (tail) ===="; tail -n 200 /tmp/chain.log || true
          echo "==== game.log (tail) ===="; tail -n 200 /tmp/game.log || true
