<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="conn-tk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="nc-tk" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#67FFFF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </radialGradient>
    <radialGradient id="np-tk" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </radialGradient>
    <linearGradient id="ring-tk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow-tk">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Coin disc -->
  <circle cx="200" cy="200" r="198" fill="#0A0A0F"/>
  <circle cx="200" cy="200" r="192" fill="none" stroke="url(#ring-tk)" stroke-width="2.5"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#ring-tk)" stroke-width="0.8" opacity="0.4"/>

  <!-- Network mark — centered, no text, high contrast -->
  <g transform="translate(200, 190)">
    <!-- Connections (pentagon perimeter) -->
    <line x1="0" y1="-80" x2="76" y2="-25" stroke="url(#conn-tk)" stroke-width="3" stroke-linecap="round"/>
    <line x1="76" y1="-25" x2="47" y2="65" stroke="url(#conn-tk)" stroke-width="3" stroke-linecap="round"/>
    <line x1="47" y1="65" x2="-47" y2="65" stroke="url(#conn-tk)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-47" y1="65" x2="-76" y2="-25" stroke="url(#conn-tk)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-76" y1="-25" x2="0" y2="-80" stroke="url(#conn-tk)" stroke-width="3" stroke-linecap="round"/>

    <!-- Radial spokes to center -->
    <line x1="0" y1="0" x2="0" y2="-80" stroke="url(#conn-tk)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="76" y2="-25" stroke="url(#conn-tk)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="47" y2="65" stroke="url(#conn-tk)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-47" y2="65" stroke="url(#conn-tk)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-76" y2="-25" stroke="url(#conn-tk)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- ZK hidden cross (dashed) -->
    <line x1="0" y1="-80" x2="-47" y2="65" stroke="#8B5CF6" stroke-width="1.2" stroke-dasharray="6 8" opacity="0.3" stroke-linecap="round"/>
    <line x1="76" y1="-25" x2="-76" y2="-25" stroke="#8B5CF6" stroke-width="1.2" stroke-dasharray="6 8" opacity="0.2" stroke-linecap="round"/>

    <!-- Outer glow rings on nodes -->
    <g filter="url(#glow-tk)">
      <!-- Center hub -->
      <circle cx="0" cy="0" r="14" fill="url(#nc-tk)"/>
      <circle cx="0" cy="0" r="8" fill="#fff" opacity="0.15"/>
      <!-- Outer nodes -->
      <circle cx="0" cy="-80" r="10" fill="url(#nc-tk)"/>
      <circle cx="76" cy="-25" r="10" fill="url(#np-tk)"/>
      <circle cx="47" cy="65" r="10" fill="url(#nc-tk)"/>
      <circle cx="-47" cy="65" r="10" fill="url(#np-tk)"/>
      <circle cx="-76" cy="-25" r="10" fill="url(#nc-tk)"/>
    </g>
  </g>
</svg>
