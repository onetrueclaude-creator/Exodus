<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feComposite in="blur" in2="SourceGraphic" operator="over"/></filter>
    <filter id="glow-strong"><feGaussianBlur stdDeviation="6" result="blur"/><feComposite in="blur" in2="SourceGraphic" operator="over"/></filter>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="orbit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.25"/>
    </linearGradient>
    <radialGradient id="nc" cx="40%" cy="35%"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#CBD5E1"/></radialGradient>
  </defs>

  <!-- Coin disc -->
  <circle cx="100" cy="100" r="98" fill="#0A0A0F"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="url(#ring)" stroke-width="1.5"/>

  <!-- Faction-colored spokes -->
  <line x1="100" y1="100" x2="52" y2="52" stroke="#0D9488" stroke-width="3" stroke-linecap="round" opacity="0.1"/>
  <line x1="100" y1="100" x2="52" y2="52" stroke="#0D9488" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="100" y1="100" x2="148" y2="52" stroke="#DC2680" stroke-width="3" stroke-linecap="round" opacity="0.1"/>
  <line x1="100" y1="100" x2="148" y2="52" stroke="#DC2680" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="100" y1="100" x2="148" y2="148" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.1"/>
  <line x1="100" y1="100" x2="148" y2="148" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="100" y1="100" x2="52" y2="148" stroke="#3B82F6" stroke-width="3" stroke-linecap="round" opacity="0.1"/>
  <line x1="100" y1="100" x2="52" y2="148" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>

  <!-- Square frame -->
  <line x1="52" y1="52" x2="148" y2="52" stroke="#667788" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
  <line x1="148" y1="52" x2="148" y2="148" stroke="#667788" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
  <line x1="148" y1="148" x2="52" y2="148" stroke="#667788" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
  <line x1="52" y1="148" x2="52" y2="52" stroke="#667788" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>

  <!-- Orbital ring -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="url(#orbit)" stroke-width="1"/>

  <!-- Faction glow halos -->
  <g filter="url(#glow-strong)">
    <circle cx="52" cy="52" r="5" fill="#0D9488" opacity="0.2"/>
    <circle cx="148" cy="52" r="5" fill="#DC2680" opacity="0.2"/>
    <circle cx="148" cy="148" r="5" fill="#F59E0B" opacity="0.2"/>
    <circle cx="52" cy="148" r="5" fill="#3B82F6" opacity="0.2"/>
  </g>

  <!-- Nodes — bigger, bolder -->
  <g filter="url(#glow)">
    <circle cx="100" cy="100" r="10" fill="url(#nc)" opacity="0.95"/>
    <circle cx="100" cy="100" r="5.5" fill="#fff" opacity="0.2"/>
    <circle cx="52" cy="52" r="8" fill="#0D9488" opacity="0.95"/>
    <circle cx="148" cy="52" r="8" fill="#DC2680" opacity="0.95"/>
    <circle cx="148" cy="148" r="8" fill="#F59E0B" opacity="0.9"/>
    <circle cx="52" cy="148" r="8" fill="#3B82F6" opacity="0.95"/>

    <!-- Edge midpoint dots — slightly bigger -->
    <circle cx="100" cy="52" r="2.5" fill="#8B5CF6" opacity="0.5"/>
    <circle cx="148" cy="100" r="2.5" fill="#8B5CF6" opacity="0.5"/>
    <circle cx="100" cy="148" r="2.5" fill="#8B5CF6" opacity="0.5"/>
    <circle cx="52" cy="100" r="2.5" fill="#8B5CF6" opacity="0.5"/>
  </g>
</svg>
