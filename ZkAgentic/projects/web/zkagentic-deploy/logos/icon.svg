<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Organic brush displacement -->
    <filter id="brush" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.012" numOctaves="4" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Node glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>

    <!-- Connection gradients -->
    <linearGradient id="grad-radial" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="grad-perim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.25"/>
    </linearGradient>
    <radialGradient id="node-cyan" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#5EEAFF"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </radialGradient>
    <radialGradient id="node-purple" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
    <radialGradient id="node-center" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#67FFFF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </radialGradient>
  </defs>

  <!-- Brushwork connections -->
  <g filter="url(#brush)">
    <!-- Perimeter connections (thinner, subtler) -->
    <path d="M95,24 Q140,18 168,56" stroke="url(#grad-perim)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M168,56 Q178,110 153,152" stroke="url(#grad-perim)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M153,152 Q100,175 44,146" stroke="url(#grad-perim)" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M44,146 Q18,108 30,68" stroke="url(#grad-perim)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M30,68 Q48,32 95,24" stroke="url(#grad-perim)" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Radial connections from center (thicker, brush-like) -->
    <!-- Double-stroke technique: thick underlayer + thin bright overlay -->
    <path d="M100,100 Q96,58 95,24" stroke="#00D4FF" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.15"/>
    <path d="M100,100 Q96,58 95,24" stroke="url(#grad-radial)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <path d="M100,100 Q140,72 168,56" stroke="#8B5CF6" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.15"/>
    <path d="M100,100 Q140,72 168,56" stroke="url(#grad-radial)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <path d="M100,100 Q132,132 153,152" stroke="#00D4FF" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.15"/>
    <path d="M100,100 Q132,132 153,152" stroke="url(#grad-radial)" stroke-width="2.2" fill="none" stroke-linecap="round"/>

    <path d="M100,100 Q66,128 44,146" stroke="#8B5CF6" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.15"/>
    <path d="M100,100 Q66,128 44,146" stroke="url(#grad-radial)" stroke-width="2.2" fill="none" stroke-linecap="round"/>

    <path d="M100,100 Q58,82 30,68" stroke="#00D4FF" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.15"/>
    <path d="M100,100 Q58,82 30,68" stroke="url(#grad-radial)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- ZK hidden cross-connection (dashed, privacy motif) -->
    <path d="M95,24 Q105,140 44,146" stroke="#8B5CF6" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-dasharray="6 8" opacity="0.3"/>
  </g>

  <!-- Nodes with glow -->
  <g filter="url(#glow)">
    <!-- Center hub (largest, brightest) -->
    <circle cx="100" cy="100" r="11" fill="url(#node-center)" opacity="0.95"/>
    <circle cx="100" cy="100" r="6" fill="#fff" opacity="0.25"/>

    <!-- Outer nodes (alternating cyan/purple, varying size) -->
    <circle cx="95" cy="24" r="7" fill="url(#node-cyan)" opacity="0.9"/>
    <circle cx="168" cy="56" r="7.5" fill="url(#node-purple)" opacity="0.9"/>
    <circle cx="153" cy="152" r="6" fill="url(#node-cyan)" opacity="0.85"/>
    <circle cx="44" cy="146" r="7.5" fill="url(#node-purple)" opacity="0.9"/>
    <circle cx="30" cy="68" r="6.5" fill="url(#node-cyan)" opacity="0.9"/>
  </g>
</svg>
