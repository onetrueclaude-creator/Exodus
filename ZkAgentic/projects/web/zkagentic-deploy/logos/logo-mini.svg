<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="brush-m" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow-m">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="over"/>
    </filter>
    <linearGradient id="conn-m" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="nc-m" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#67FFFF"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </radialGradient>
    <radialGradient id="np-m" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
  </defs>

  <!-- Simplified 3-node triangle + center -->
  <g filter="url(#brush-m)">
    <!-- Triangle perimeter -->
    <path d="M32,10 Q50,8 52,42" stroke="url(#conn-m)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M52,42 Q34,56 12,42" stroke="url(#conn-m)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M12,42 Q14,18 32,10" stroke="url(#conn-m)" stroke-width="1.8" fill="none" stroke-linecap="round"/>

    <!-- Radial to center -->
    <path d="M32,32 Q32,18 32,10" stroke="#00D4FF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.15"/>
    <path d="M32,32 Q32,18 32,10" stroke="url(#conn-m)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M32,32 Q44,38 52,42" stroke="#8B5CF6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.15"/>
    <path d="M32,32 Q44,38 52,42" stroke="url(#conn-m)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M32,32 Q20,38 12,42" stroke="#00D4FF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.15"/>
    <path d="M32,32 Q20,38 12,42" stroke="url(#conn-m)" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- ZK dashed cross -->
    <path d="M32,10 Q28,40 12,42" stroke="#8B5CF6" stroke-width="1" fill="none" stroke-linecap="round" stroke-dasharray="3 5" opacity="0.25"/>
  </g>

  <!-- Nodes -->
  <g filter="url(#glow-m)">
    <circle cx="32" cy="32" r="5.5" fill="url(#nc-m)" opacity="0.95"/>
    <circle cx="32" cy="32" r="3" fill="#fff" opacity="0.2"/>
    <circle cx="32" cy="10" r="4" fill="url(#nc-m)" opacity="0.9"/>
    <circle cx="52" cy="42" r="4.2" fill="url(#np-m)" opacity="0.9"/>
    <circle cx="12" cy="42" r="3.8" fill="url(#nc-m)" opacity="0.9"/>
  </g>
</svg>
