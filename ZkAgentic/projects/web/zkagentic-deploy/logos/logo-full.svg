<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160">
  <defs>
    <filter id="glow-f"><feGaussianBlur stdDeviation="2" result="blur"/><feComposite in="blur" in2="SourceGraphic" operator="over"/></filter>
    <filter id="glow-strong-f"><feGaussianBlur stdDeviation="4" result="blur"/><feComposite in="blur" in2="SourceGraphic" operator="over"/></filter>
    <filter id="text-glow-f">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="ring-f" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="orbit-f" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="nc-f" cx="40%" cy="35%"><stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#CBD5E1"/></radialGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0F7FF"/>
    </linearGradient>
    <linearGradient id="sub-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Network mark: faction-glow coin disc centered at (80, 80) -->
  <circle cx="80" cy="80" r="68" fill="#0A0A0F"/>
  <circle cx="80" cy="80" r="65" fill="none" stroke="url(#ring-f)" stroke-width="1.2"/>

  <!-- Faction-colored spokes -->
  <line x1="80" y1="80" x2="43" y2="43" stroke="#0D9488" stroke-width="2" stroke-linecap="round" opacity="0.08"/>
  <line x1="80" y1="80" x2="43" y2="43" stroke="#0D9488" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="80" y1="80" x2="117" y2="43" stroke="#DC2680" stroke-width="2" stroke-linecap="round" opacity="0.08"/>
  <line x1="80" y1="80" x2="117" y2="43" stroke="#DC2680" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="80" y1="80" x2="117" y2="117" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.08"/>
  <line x1="80" y1="80" x2="117" y2="117" stroke="#F59E0B" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="80" y1="80" x2="43" y2="117" stroke="#3B82F6" stroke-width="2" stroke-linecap="round" opacity="0.08"/>
  <line x1="80" y1="80" x2="43" y2="117" stroke="#3B82F6" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

  <!-- Square frame (neutral) -->
  <line x1="43" y1="43" x2="117" y2="43" stroke="#667788" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
  <line x1="117" y1="43" x2="117" y2="117" stroke="#667788" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
  <line x1="117" y1="117" x2="43" y2="117" stroke="#667788" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>
  <line x1="43" y1="117" x2="43" y2="43" stroke="#667788" stroke-width="0.8" stroke-linecap="round" opacity="0.35"/>

  <!-- Orbital ring -->
  <circle cx="80" cy="80" r="47" fill="none" stroke="url(#orbit-f)" stroke-width="1"/>

  <!-- Faction glow halos -->
  <g filter="url(#glow-strong-f)">
    <circle cx="43" cy="43" r="3" fill="#0D9488" opacity="0.15"/>
    <circle cx="117" cy="43" r="3" fill="#DC2680" opacity="0.15"/>
    <circle cx="117" cy="117" r="3" fill="#F59E0B" opacity="0.15"/>
    <circle cx="43" cy="117" r="3" fill="#3B82F6" opacity="0.15"/>
  </g>

  <!-- Nodes -->
  <g filter="url(#glow-f)">
    <circle cx="80" cy="80" r="7" fill="url(#nc-f)" opacity="0.95"/>
    <circle cx="80" cy="80" r="4" fill="#fff" opacity="0.15"/>
    <circle cx="43" cy="43" r="5" fill="#0D9488" opacity="0.9"/>
    <circle cx="117" cy="43" r="5" fill="#DC2680" opacity="0.9"/>
    <circle cx="117" cy="117" r="5" fill="#F59E0B" opacity="0.85"/>
    <circle cx="43" cy="117" r="5" fill="#3B82F6" opacity="0.9"/>
  </g>

  <!-- Edge midpoint dots -->
  <circle cx="80" cy="43" r="1.5" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="117" cy="80" r="1.5" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="80" cy="117" r="1.5" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="43" cy="80" r="1.5" fill="#8B5CF6" opacity="0.4"/>

  <!-- Text: ZK AGENTIC CHAIN -->
  <text x="185" y="72" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Courier New', monospace" font-size="18" font-weight="600" letter-spacing="6" fill="url(#sub-grad)" filter="url(#text-glow-f)" opacity="0.7">ZK</text>
  <text x="185" y="105" font-family="'Instrument Sans', 'DM Sans', 'Helvetica Neue', sans-serif" font-size="40" font-weight="700" letter-spacing="3" fill="url(#title-grad)" filter="url(#text-glow-f)">AGENTIC CHAIN</text>
  <line x1="185" y1="115" x2="380" y2="115" stroke="url(#sub-grad)" stroke-width="1" opacity="0.2"/>
  <text x="185" y="135" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Courier New', monospace" font-size="10" font-weight="400" letter-spacing="3" fill="#00D4FF" opacity="0.45">PROOF OF AI VERIFICATION</text>
</svg>
